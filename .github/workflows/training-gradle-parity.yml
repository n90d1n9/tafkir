name: Training Gradle Parity

on:
  pull_request:
    paths:
      - "buildSrc/src/main/kotlin/tafkir.training-gates.gradle.kts"
      - "gradle/training-module-*.json"
      - "gradle/training-module-checks.gradle.kts"
      - "settings.gradle.kts"
      - "scripts/verify-training-advisory-gates-fast.py"
      - "scripts/test-training-fast-gradle-parity.sh"
      - ".github/workflows/training-gradle-parity.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "buildSrc/src/main/kotlin/tafkir.training-gates.gradle.kts"
      - "gradle/training-module-*.json"
      - "gradle/training-module-checks.gradle.kts"
      - "settings.gradle.kts"
      - "scripts/verify-training-advisory-gates-fast.py"
      - "scripts/test-training-fast-gradle-parity.sh"
      - ".github/workflows/training-gradle-parity.yml"
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

jobs:
  training-gradle-parity:
    name: Training Gradle/Fast Gate Parity
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Validate parity script syntax
        shell: bash
        run: |
          set -euo pipefail
          jq --version
          bash -n scripts/test-training-fast-gradle-parity.sh

      - name: Compare Gradle and fast training gate reports
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/test-training-fast-gradle-parity.sh \
            --candidate audio,vision \
            --artifact-dir /tmp/tafkir-training-gradle-parity

      - name: Summarize parity result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          summary=/tmp/tafkir-training-gradle-parity/training-gradle-parity-summary.json
          if [ ! -f "$summary" ]; then
            echo "## Training Gradle Parity" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No parity summary was produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "## Training Gradle Parity" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          jq -r '
            "- Passed: \(.passed)",
            "- Exit code: \(.exitCode)",
            "- Duration: \(.durationSeconds)s",
            "- Selected candidates: \(.selectedCandidates)",
            "- Compared reports: \(.comparedReportCount)",
            "- Failed report: \(if .failedReport == "" then "none" else .failedReport end)"
          ' "$summary" >> "$GITHUB_STEP_SUMMARY"
          artifact_root="$(jq -r '.artifacts.root' "$summary")"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact bundle: \`$artifact_root\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          jq . "$summary"

      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-gradle-parity-artifacts
          path: /tmp/tafkir-training-gradle-parity
          if-no-files-found: warn
