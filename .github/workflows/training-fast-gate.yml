name: Training Fast Gate

on:
  pull_request:
    paths:
      - "training/**"
      - "buildSrc/**"
      - "gradle/training-module-*.json"
      - "gradle/training-module-checks.gradle.kts"
      - "settings.gradle.kts"
      - "scripts/verify-training-advisory-gates-fast.py"
      - "scripts/test-training-fast-gate.sh"
      - ".github/workflows/training-fast-gate.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "training/**"
      - "buildSrc/**"
      - "gradle/training-module-*.json"
      - "gradle/training-module-checks.gradle.kts"
      - "settings.gradle.kts"
      - "scripts/verify-training-advisory-gates-fast.py"
      - "scripts/test-training-fast-gate.sh"
      - ".github/workflows/training-fast-gate.yml"
  workflow_dispatch:

jobs:
  training-fast-gate:
    name: Training Metadata Fast Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate training fast gate contract
        shell: bash
        run: |
          set -euo pipefail
          jq --version
          scripts/test-training-fast-gate.sh

      - name: Write training fast gate artifacts
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify-training-advisory-gates-fast.py \
            --output-dir /tmp/tafkir-training-fast-gate
          jq '{format, passed, counts, locks, reports}' \
            /tmp/tafkir-training-fast-gate/training-module-fast-gate-summary.json

      - name: Upload training fast gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-fast-gate-artifacts
          path: /tmp/tafkir-training-fast-gate
          if-no-files-found: error
