name: Benchmark Matrix Smoke

on:
  pull_request:
    paths:
      - "scripts/bench-*.sh"
      - "docs/bench-multilora-zipf.md"
      - "docs/libtorch-cuda-advanced-roadmap.md"
      - ".github/workflows/bench-matrix-smoke.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "scripts/bench-*.sh"
      - ".github/workflows/bench-matrix-smoke.yml"
  workflow_dispatch:

jobs:
  matrix-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate scripts syntax
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/bench-multilora-zipf.sh
          bash -n scripts/bench-compare.sh
          bash -n scripts/bench-matrix-advanced.sh

      - name: Run matrix smoke with mock inference server
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY' &
          import json
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class Handler(BaseHTTPRequestHandler):
              def _write_json(self, payload, code=200):
                  body = json.dumps(payload).encode("utf-8")
                  self.send_response(code)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def do_POST(self):
                  if self.path == "/api/v1/inference":
                      length = int(self.headers.get("Content-Length", "0"))
                      if length:
                          _ = self.rfile.read(length)
                      self._write_json({"id": "mock", "output": "ok", "status": "success"})
                      return
                  self._write_json({"error": "not found"}, 404)

              def do_GET(self):
                  if self.path == "/q/health/ready":
                      # Static health payload for deterministic CI smoke.
                      self._write_json({
                          "status": "UP",
                          "advanced_attention_mode": "baseline",
                          "advanced_sage_attention2_requested": True,
                      })
                      return
                  self._write_json({"error": "not found"}, 404)

              def log_message(self, fmt, *args):
                  return

          server = HTTPServer(("127.0.0.1", 18080), Handler)
          server.serve_forever()
          PY
          server_pid="$!"

          cleanup() {
            kill "${server_pid}" >/dev/null 2>&1 || true
            wait "${server_pid}" 2>/dev/null || true
          }
          trap cleanup EXIT

          ./scripts/bench-matrix-advanced.sh \
            --endpoint http://127.0.0.1:18080/api/v1/inference \
            --health-url http://127.0.0.1:18080/q/health/ready \
            --runtime-tag-gate on \
            --requests 8 \
            --concurrency 2 \
            --adapters 4 \
            --mix balanced \
            --telemetry off \
            --gpu-telemetry off \
            --hybrid-min-throughput-pct -100 \
            --hybrid-max-latency-regress-pct 1000 \
            --hybrid-max-error-regress-abs 1 \
            --out-dir /tmp/tafkir-bench-matrix-ci \
            --name ci-smoke

      - name: Upload matrix artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-matrix-smoke-artifacts
          path: /tmp/tafkir-bench-matrix-ci/ci-smoke
          if-no-files-found: error
