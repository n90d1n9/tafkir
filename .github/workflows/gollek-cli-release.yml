name: Tafkir CLI Release

on:
  push:
    tags:
      - 'test-latest'
      - 'tafkir-v*'
      - 'v*'
      - '*.*.*'
  workflow_dispatch:

concurrency:
  group: tafkir-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-native:
    name: Build Native (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            binary_name: tafkir-linux-x64
            runner_pattern: tafkir-cli-*-runner
          - os: macos-latest
            platform: macos
            binary_name: tafkir-macos-x64
            runner_pattern: tafkir-cli-*-runner
          - os: windows-latest
            platform: windows
            binary_name: tafkir-windows-x64.exe
            runner_pattern: tafkir-cli-*-runner.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: '25'
          cache: gradle

      - name: Check product boundaries
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/check-product-boundaries.sh

      - name: Prepare llama.cpp source (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          export TAFKIR_HOME="${TAFKIR_HOME:-$HOME/.tafkir}"
          TAFKIR_LLAMA_SOURCE_DIR="$TAFKIR_HOME/source/vendor/llama.cpp" \
          ./scripts/prepare-llama-source.sh

      - name: Prepare libtorch source (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          export TAFKIR_HOME="${TAFKIR_HOME:-$HOME/.tafkir}"
          TAFKIR_LIBTORCH_SOURCE_DIR="$TAFKIR_HOME/source/vendor/libtorch" \
          ./scripts/prepare-libtorch-source.sh

      - name: Install native build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev pkg-config

      - name: Install native build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install automake

      - name: Build native executable (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export TAFKIR_HOME="${TAFKIR_HOME:-$HOME/.tafkir}"
          export TAFKIR_LLAMA_SOURCE_DIR="$TAFKIR_HOME/source/vendor/llama.cpp"
          export TAFKIR_LIBTORCH_SOURCE_DIR="$TAFKIR_HOME/source/vendor/libtorch"
          export TAFKIR_LIBTORCH_LIB_PATH="$TAFKIR_HOME/source/vendor/libtorch/lib"
          ./gradlew --no-daemon --stacktrace :ui:tafkir-cli:buildNative -x test
        env:
          GRADLE_OPTS: -Xmx3G

      - name: Build native executable (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export TAFKIR_HOME="${TAFKIR_HOME:-$HOME/.tafkir}"
          export TAFKIR_LLAMA_SOURCE_DIR="$TAFKIR_HOME/source/vendor/llama.cpp"
          export TAFKIR_LIBTORCH_SOURCE_DIR="$TAFKIR_HOME/source/vendor/libtorch"
          export TAFKIR_LIBTORCH_LIB_PATH="$TAFKIR_HOME/source/vendor/libtorch/lib"
          ./gradlew --no-daemon --stacktrace :ui:tafkir-cli:buildNative -x test
        env:
          GRADLE_OPTS: -Xmx3G

      - name: Stage native artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN_PATH=$(ls ui/tafkir-cli/build/${{ matrix.runner_pattern }} | head -n 1)
          cp "$BIN_PATH" "dist/${{ matrix.binary_name }}"
          chmod +x "dist/${{ matrix.binary_name }}"
          tar -czf "dist/${{ matrix.binary_name }}.tar.gz" -C dist "${{ matrix.binary_name }}"

      - name: Build macOS pkg installer
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#tafkir-v}"
          VERSION="${VERSION#v}"
          if [ "$VERSION" = "test-latest" ]; then
            VERSION="0.0.0"
          fi
          PKGROOT="$(pwd)/pkgroot"
          mkdir -p "$PKGROOT/usr/local/bin"
          cp "dist/${{ matrix.binary_name }}" "$PKGROOT/usr/local/bin/tafkir"
          chmod +x "$PKGROOT/usr/local/bin/tafkir"
          pkgbuild \
            --identifier tech.kayys.tafkir.cli \
            --version "$VERSION" \
            --install-location / \
            "$PKGROOT" \
            "dist/tafkir-macos-x64.pkg"

      - name: Stage native artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bin = Get-ChildItem "ui/tafkir-cli/build/${{ matrix.runner_pattern }}" | Select-Object -First 1
          Copy-Item $bin.FullName "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "dist/tafkir-windows-x64.zip" -Force

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tafkir-native-${{ matrix.platform }}
          path: dist/*

  build-jvm-dist:
    name: Build JVM Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Prepare llama.cpp source
        shell: bash
        run: |
          set -euo pipefail
          export TAFKIR_HOME="${TAFKIR_HOME:-$HOME/.tafkir}"
          TAFKIR_LLAMA_SOURCE_DIR="$TAFKIR_HOME/source/vendor/llama.cpp" \
          ./scripts/prepare-llama-source.sh

      - name: Prepare libtorch source
        shell: bash
        run: |
          set -euo pipefail
          export TAFKIR_HOME="${TAFKIR_HOME:-$HOME/.tafkir}"
          TAFKIR_LIBTORCH_SOURCE_DIR="$TAFKIR_HOME/source/vendor/libtorch" \
          ./scripts/prepare-libtorch-source.sh

      - name: Build JVM package
        shell: bash
        run: |
          export TAFKIR_HOME="${TAFKIR_HOME:-$HOME/.tafkir}"
          export TAFKIR_LLAMA_SOURCE_DIR="$TAFKIR_HOME/source/vendor/llama.cpp"
          export TAFKIR_LIBTORCH_SOURCE_DIR="$TAFKIR_HOME/source/vendor/libtorch"
          export TAFKIR_LIBTORCH_LIB_PATH="$TAFKIR_HOME/source/vendor/libtorch/lib"
          ./gradlew --no-daemon --stacktrace :ui:tafkir-cli:quarkusBuild -x test

      - name: Stage JVM bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/jvm/bin dist/jvm/app
          cp -R ui/tafkir-cli/build/quarkus-app/. dist/jvm/app/

          cat > dist/jvm/bin/tafkir <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          APP_DIR="${SCRIPT_DIR}/../app"
          exec java -jar "${APP_DIR}/quarkus-run.jar" "$@"
          SH
          chmod +x dist/jvm/bin/tafkir

          cat > dist/jvm/bin/tafkir.bat <<'BAT'
          @echo off
          set SCRIPT_DIR=%~dp0
          set APP_DIR=%SCRIPT_DIR%..\app
          java -jar "%APP_DIR%\quarkus-run.jar" %*
          BAT

          (cd dist/jvm && zip -r ../tafkir-jvm.zip .)

      - name: Upload JVM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tafkir-jvm
          path: dist/*

  release:
    name: Create GitHub Release
    needs:
      - build-native
      - build-jvm-dist
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: incoming

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION_TAG="${GITHUB_REF_NAME}"
          VERSION="${VERSION_TAG#tafkir-v}"
          VERSION="${VERSION#v}"
          if [ "$VERSION_TAG" = "test-latest" ]; then
            VERSION="0.0.0"
          fi
          REPO="${GITHUB_REPOSITORY}"

          mkdir -p release
          find incoming -type f -maxdepth 3 -print -exec cp {} release/ \;

          pushd release >/dev/null
          sha256sum * > SHA256SUMS
          popd >/dev/null

          cat > release/install.sh <<'INSTALL_SH'
          #!/usr/bin/env bash
          set -euo pipefail

          REPO="__REPO__"
          TAG="__TAG__"
          INSTALL_DIR="${INSTALL_DIR:-/usr/local/bin}"
          TAFKIR_HOME="${TAFKIR_HOME:-$HOME/.tafkir}"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          case "$OS" in
            darwin) ASSET="tafkir-macos-x64.tar.gz" ;;
            linux) ASSET="tafkir-linux-x64.tar.gz" ;;
            *)
              echo "Unsupported OS: $OS"
              exit 1
              ;;
          esac

          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          curl -fsSL "${BASE_URL}/${ASSET}" -o "${TMP_DIR}/${ASSET}"
          tar -xzf "${TMP_DIR}/${ASSET}" -C "${TMP_DIR}"
          chmod +x "${TMP_DIR}/tafkir"

          if [ -w "${INSTALL_DIR}" ]; then
            cp "${TMP_DIR}/tafkir" "${INSTALL_DIR}/tafkir"
          else
            sudo cp "${TMP_DIR}/tafkir" "${INSTALL_DIR}/tafkir"
          fi

          mkdir -p "$TAFKIR_HOME"/{config,logs,models,mcp,libs,source/vendor,run}

          cat > "${TAFKIR_HOME}/config/environment" <<'ENVFILE'
          TAFKIR_HOME=${TAFKIR_HOME:-$HOME/.tafkir}
          TAFKIR_CLI_LOG_FILE=${TAFKIR_CLI_LOG_FILE:-$TAFKIR_HOME/logs/tafkir.log}
          TAFKIR_SERVICE_CMD=${TAFKIR_SERVICE_CMD:-/usr/local/bin/tafkir}
          ENVFILE

          echo "Installed to ${INSTALL_DIR}/tafkir"
          echo "Runtime home: ${TAFKIR_HOME}"
          "${INSTALL_DIR}/tafkir" --version || true
          INSTALL_SH

          cat > release/install-service.sh <<'INSTALL_SERVICE_SH'
          #!/usr/bin/env bash
          set -euo pipefail

          if ! command -v systemctl >/dev/null 2>&1; then
            echo "systemctl not found. install-service.sh currently supports Linux systemd user services."
            exit 1
          fi

          TAFKIR_HOME="${TAFKIR_HOME:-$HOME/.tafkir}"

          mkdir -p "$TAFKIR_HOME"/{config,logs,models,mcp,run,libs,source/vendor}
          if command -v tafkir >/dev/null 2>&1; then
            DEFAULT_SERVICE_CMD="$(command -v tafkir)"
          else
            DEFAULT_SERVICE_CMD="/usr/local/bin/tafkir"
          fi
          SERVICE_FILE="$HOME/.config/systemd/user/tafkir.service"
          mkdir -p "$(dirname "$SERVICE_FILE")"

          cat > "$SERVICE_FILE" <<EOF
          [Unit]
          Description=Tafkir Service
          After=network.target

          [Service]
          Type=simple
          EnvironmentFile=-$TAFKIR_HOME/config/environment
          Environment=TAFKIR_HOME=$TAFKIR_HOME
          Environment=TAFKIR_CLI_LOG_FILE=$TAFKIR_HOME/logs/tafkir.log
          Environment=TAFKIR_SERVICE_CMD=\${TAFKIR_SERVICE_CMD:-$DEFAULT_SERVICE_CMD}
          ExecStart=/bin/sh -lc '\$TAFKIR_SERVICE_CMD'
          Restart=on-failure
          RestartSec=5
          StandardOutput=append:$TAFKIR_HOME/logs/tafkir-service.log
          StandardError=append:$TAFKIR_HOME/logs/tafkir-service.log
          WorkingDirectory=$TAFKIR_HOME

          [Install]
          WantedBy=default.target
          EOF

          systemctl --user daemon-reload
          systemctl --user enable tafkir.service
          echo "Installed user service template: tafkir.service"
          echo "Set TAFKIR_SERVICE_CMD in \$TAFKIR_HOME/config/environment, then run:"
          echo "  systemctl --user start tafkir.service"
          echo "Logs: $TAFKIR_HOME/logs/tafkir.log"
          INSTALL_SERVICE_SH

          cat > release/install.ps1 <<'INSTALL_PS1'
          $ErrorActionPreference = 'Stop'
          $repo = '__REPO__'
          $tag = '__TAG__'
          $asset = 'tafkir-windows-x64.exe'
          $installDir = "$env:ProgramFiles\\Tafkir"
          $tmpExe = Join-Path $env:TEMP 'tafkir.exe'
          $url = "https://github.com/$repo/releases/download/$tag/$asset"

          if (!(Test-Path $installDir)) {
            New-Item -ItemType Directory -Path $installDir -Force | Out-Null
          }

          $tafkirHome = if ($env:TAFKIR_HOME) { $env:TAFKIR_HOME } else { Join-Path $HOME ".tafkir" }
          New-Item -ItemType Directory -Force -Path $tafkirHome | Out-Null
          foreach ($dir in @("config","logs","models","mcp","run","libs","source\\vendor")) {
            New-Item -ItemType Directory -Force -Path (Join-Path $tafkirHome $dir) | Out-Null
          }

          Invoke-WebRequest -Uri $url -OutFile $tmpExe
          Copy-Item $tmpExe (Join-Path $installDir 'tafkir.exe') -Force

          $userPath = [Environment]::GetEnvironmentVariable('Path', 'User')
          if ($userPath -notlike "*$installDir*") {
            [Environment]::SetEnvironmentVariable('Path', "$userPath;$installDir", 'User')
          }

          Write-Host "Installed to $installDir\\tafkir.exe"
          Write-Host "Runtime home: $tafkirHome"
          INSTALL_PS1

          sed -i "s#__REPO__#${REPO}#g" release/install.sh release/install.ps1
          sed -i "s#__TAG__#${VERSION_TAG}#g" release/install.sh release/install.ps1
          chmod +x release/install.sh
          chmod +x release/install-service.sh

          MAC_SHA=$(sha256sum release/tafkir-macos-x64.tar.gz | awk '{print $1}')
          WIN_SHA=$(sha256sum release/tafkir-windows-x64.exe | awk '{print $1}')

          cat > release/tafkir.rb <<FORMULA
          class Tafkir < Formula
            desc "Production-ready CLI for Tafkir inference platform"
            homepage "https://github.com/${REPO}"
            url "https://github.com/${REPO}/releases/download/${VERSION_TAG}/tafkir-macos-x64.tar.gz"
            sha256 "${MAC_SHA}"
            version "${VERSION}"

            def install
              bin.install "tafkir-macos-x64" => "tafkir"
            end

            test do
              system "#{bin}/tafkir", "--version"
            end
          end
          FORMULA

          mkdir -p release/chocolatey/tools
          cat > release/chocolatey/tafkir.nuspec <<NUSPEC
          <?xml version="1.0" encoding="utf-8"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2015/06/nuspec.xsd">
            <metadata>
              <id>tafkir</id>
              <version>${VERSION}</version>
              <title>Tafkir CLI</title>
              <authors>Kayys Technologies</authors>
              <owners>Kayys Technologies</owners>
              <projectUrl>https://github.com/${REPO}</projectUrl>
              <packageSourceUrl>https://github.com/${REPO}</packageSourceUrl>
              <requireLicenseAcceptance>false</requireLicenseAcceptance>
              <summary>Production-ready CLI for Tafkir inference platform</summary>
              <description>Native-compiled Tafkir CLI for Windows.</description>
              <releaseNotes>https://github.com/${REPO}/releases/tag/${VERSION_TAG}</releaseNotes>
              <tags>tafkir cli inference ai llm</tags>
            </metadata>
            <files>
              <file src="tools\\**" target="tools" />
            </files>
          </package>
          NUSPEC

          cat > release/chocolatey/tools/chocolateyinstall.ps1 <<'CHOC'
          $ErrorActionPreference = 'Stop'
          $toolsDir = Split-Path -parent $MyInvocation.MyCommand.Definition
          $url64 = 'https://github.com/__REPO__/releases/download/__TAG__/tafkir-windows-x64.exe'

          $packageArgs = @{
            packageName    = $env:ChocolateyPackageName
            fileFullPath   = Join-Path $toolsDir 'tafkir.exe'
            url64bit       = $url64
            checksum64     = '__WIN_SHA__'
            checksumType64 = 'sha256'
          }

          Get-ChocolateyWebFile @packageArgs
          CHOC

          cat > release/chocolatey/tools/chocolateyuninstall.ps1 <<'CHOCU'
          # no-op
          CHOCU

          sed -i "s#__REPO__#${REPO}#g" release/chocolatey/tools/chocolateyinstall.ps1
          sed -i "s#__TAG__#${VERSION_TAG}#g" release/chocolatey/tools/chocolateyinstall.ps1
          sed -i "s#__WIN_SHA__#${WIN_SHA}#g" release/chocolatey/tools/chocolateyinstall.ps1

          (cd release && zip -r tafkir-chocolatey-template.zip chocolatey)
          rm -rf release/chocolatey

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/*
          draft: false
          prerelease: ${{ github.ref_name == 'test-latest' }}
          overwrite_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
